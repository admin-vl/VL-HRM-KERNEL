      #     key_option: -o KexAlgorithms=+diffie-hellman-group-exchange-sha256 #handshake between client and server

      - name: Upload files to BigRock via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps           # try ftps first
          local-dir: ./main-file/   # upload the built Laravel folder
         # server-dir: ${{ secrets.FTP_PATH }}/main-file/
          server-dir: ${{ secrets.FTP_PATH }}  #testing correct path
          
          exclude:
            |
            **/.git*
            **/node_modules/**
            **/tests/**
            **/vendor/**
            **/.github/**
          overwrite: true
          use_insecure_cipher: true
