name: Deploy to BigRock Shared Hosting

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - run: php -v

      - name: Verify directory structure
        run: |
          ls -la
          ls -la main-file/

      - name: Setup Laravel environment for build
        working-directory: ./main-file
        run: |
          cp .env.example .env || touch .env
          mkdir -p database storage/framework/cache/data storage/framework/sessions storage/framework/views
#          php artisan key:generate
#          echo "Build environment configured"
            touch database/database.sqlite
            echo "Database file created at: $(pwd)/database/database.sqlite"
            echo "APP_ENV=production" >> .env
            echo "APP_DEBUG=false" >> .env
            echo "DB_CONNECTION=sqlite" >> .env
            echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env
            echo "CACHE_STORE=file" >> .env
            echo "SESSION_DRIVER=file" >> .env

      - name: Install composer dependencies
        working-directory: ./main-file
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup temporary database for build
        working-directory: ./main-file
        run: php artisan migrate --force

      - name: Install Node Dependencies and Build
        working-directory: ./main-file
        run: |
          npm install
          npm run build

      - name: Optimize Laravel for production
        working-directory: ./main-file
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Clean upload folder
        run: |
          rm -rf main-file/node_modules
          rm -rf main-file/database/database.sqlite
          rm -rf main-file/.env
          rm -rf main-file/tests
          rm -rf main-file/.editorconfig
          rm -rf main-file/phpunit.xml
          rm -rf main-file/vite.config.js
          rm -rf main-file/package.json
          rm -rf main-file/package-lock.json
          rm -rf .git .github
          find main-file/storage -type f ! -name '.gitignore' -delete
          echo "Cleaned build artifacts"

      - name: Create test file
        run: echo "Deployment Success" > deployment_test.txt

      - name: Upload files to BigRock via SSH/SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./"
          target: ${{ secrets.SERVER_PATH }}
          overwrite: true

      - name: Setup production environment on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.SERVER_PATH }}/main-file

            # Create .env if it doesn't exist- Prod setup
            if [ ! -f .env ]; then
              echo "Creating .env file..."
              cp .env.example .env || touch .env
              echo "APP_ENV=production" >> .env
              echo "APP_DEBUG=false" >> .env
              echo "DB_CONNECTION=sqlite" >> .env
              echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env
              php artisan key:generate --force
            fi

            # Create database if it doesn't exist
            if [ ! -f database/database.sqlite ]; then
              echo "Creating production database..."
              mkdir -p database
              touch database/database.sqlite
              php artisan migrate --force
            fi

            # Set permissions
            chmod -R 775 storage bootstrap/cache

            # Clear and cache for production
            php artisan config:clear
            php artisan cache:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "Production environment setup complete!"
