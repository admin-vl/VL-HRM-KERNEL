name: Deploy to BigRock Shared Hosting

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - run: php -v

      - name: Install composer dependencies
        run: |
            composer install --no-dev --optimize-autoloader
            npm install
            npm run build

      - name: Install Node Dependencies and Build (Locally)
        run: |
          npm install
          npm run build
      - name: Clean upload folder
        run: |
          rm -rf node_modules .git .github tests

      - name: Create test file
        run: echo "Deployment Success" > deployment_test.txt

