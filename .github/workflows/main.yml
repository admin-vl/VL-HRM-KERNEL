name: Deploy to BigRock Shared Hosting

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - run: php -v

      - name: Verify directory structure
        run: |
          ls -la
          ls -la main-file/

      - name: Install composer dependencies
        run: |
          cd main-file
          composer install --no-dev --optimize-autoloader

      - name: Install Node Dependencies and Build
        working-directory: ./main-file
        run: |
          npm install
          npm run build
      - name: Clean upload folder
        run: |
          rm -rf main-file/node_modules .git .github tests

      - name: Create test file
        run: echo "Deployment Success" > deployment_test.txt

      - name: Upload files to BigRock via SSH/SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./"
          target: ${{ secrets.SERVER_PATH }}
          overwrite: true
